isli_version: "2.0"
id: "bam-fx-rates-wan"
name: "Bank Al-Maghrib Exchange Rates"
description: "Fetches live Moroccan Dirham (MAD) exchange rates and monetary statistics from the Central Bank of Morocco (BAM)."
version: "1.0.0"
author: "ISLI Community"
category: "finance"

runtime:
  port: 8000
  build:
    context: "."
    dockerfile: "Dockerfile"

auth:
  type: "internal_jwt"

tools:
  - name: "get_exchange_rates"
    description: "Fetches the daily reference exchange rates for MAD against major currencies."
    endpoint: "get-exchange-rates"
    method: "POST"
    parameters:
      type: "object"
      properties:
        currency: 
          type: "string"
          description: "Optional 3-letter currency code (e.g., USD, EUR) to filter results."
        date: 
          type: "string"
          description: "Optional historical date in YYYY-MM-DD format."
      required: []

  - name: "get_monetary_stats"
    description: "Fetches broad monetary statistics from the Central Bank of Morocco."
    endpoint: "get-monetary-stats"
    method: "POST"
    parameters:
      type: "object"
      properties:
        indicator:
          type: "string"
          description: "Optional specific statistical indicator."
      required: []
